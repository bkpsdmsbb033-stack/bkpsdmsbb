<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Laporan Kehadiran - SBB</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; }

        /* AREA LAPORAN PDF */
        #report-area { 
            width: 100%; 
            max-width: 480px; 
            background: white; 
            display: flex;
            flex-direction: column;
        }

        .header-kop {
            display: flex;
            align-items: center;
            padding: 18px;
            background: white;
            border-bottom: 2px solid #000;
            gap: 15px;
        }
        .logo-kab { width: 45px; height: 55px; object-fit: contain; }
        .opd-info b { font-size: 15px; color: #111; display: block; text-transform: uppercase; line-height: 1.2; }
        .opd-info span { font-size: 11px; color: #444; font-weight: bold; }

        #photo-container { position: relative; width: 100%; background: #000; line-height: 0; overflow: hidden; }
        video { width: 100%; display: block; }
        canvas#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #snapshot-canvas { display: none; width: 100%; }

        .data-footer {
            padding: 18px;
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid #eee;
        }
        
        .footer-section h4 { 
            margin: 0 0 8px 0; 
            font-size: 13px; 
            color: var(--success); 
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }

        .info-text { font-size: 11px; color: #333; line-height: 1.5; }
        .info-text b { color: #000; }
        #map { width: 100%; height: 90px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .rekap-grid { display: grid; grid-template-columns: 1fr auto; gap: 4px; font-size: 11px; }

        /* PANEL KONTROL */
        .controls { width: 92%; max-width: 480px; margin: 20px 0; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
        .btn-main { background: var(--success); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body onload="startApp()">

    <div id="report-area">
        <div class="header-kop">
            <img src="img/Kab-sbb.png" class="logo-kab" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/b/b1/Logo_Kabupaten_Seram_Bagian_Barat.png'">
            <div class="opd-info">
                <b id="opd-name-top">BKPSDM</b>
                <span>PEMERINTAH KABUPATEN SERAM BAGIAN BARAT</span>
            </div>
        </div>

        <div id="photo-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <canvas id="snapshot-canvas"></canvas>
        </div>

        <div class="data-footer">
            <div class="footer-section">
                <h4>INFORMASI LOKASI</h4>
                <div class="info-text">
                    📅 Tanggal: <b id="wm-date">-</b><br>
                    ⏰ Waktu: <b id="wm-time">-</b><br>
                    📍 Koordinat: <b id="location-text">Mencari GPS...</b><br>
                    <span style="color:var(--success); font-weight:bold" id="gps-accuracy">📡 Mengunci Sinyal...</span>
                </div>
                <div id="map"></div>
            </div>
            
            <div class="footer-section">
                <h4>REKAP KEHADIRAN</h4>
                <div class="rekap-grid">
                    <span>Hadir (AI):</span> <b id="out-hadir">0</b>
                    <span>Cuti:</span> <b id="out-cuti">0</b>
                    <span>Izin:</span> <b id="out-izin">0</b>
                    <span>Sakit:</span> <b id="out-sakit">0</b>
                    <span>Tugas:</span> <b id="out-tugas">0</b>
                    <span>Izin Belajar:</span> <b id="out-belajar">0</b>
                </div>
                <p style="font-size: 9px; margin-top: 15px; color: #888; font-style: italic;">
                    * Laporan terverifikasi sistem GPS & Wajah.
                </p>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="input-opd" placeholder="Ketik Nama OPD..." oninput="syncText(this, 'opd-name-top')" style="margin-bottom:12px;">
        <div class="grid-input">
            <input type="number" placeholder="Cuti" oninput="syncText(this, 'out-cuti')">
            <input type="number" placeholder="Izin" oninput="syncText(this, 'out-izin')">
            <input type="number" placeholder="Sakit" oninput="syncText(this, 'out-sakit')">
            <input type="number" placeholder="Tugas" oninput="syncText(this, 'out-tugas')">
            <input type="number" placeholder="Izin Belajar" oninput="syncText(this, 'out-belajar')" style="grid-column: span 2;">
        </div>
        <button class="btn-main" id="btn-save" onclick="generateFastPDF()" disabled>⌛ MENGUNCI LOKASI...</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnSave = document.getElementById('btn-save');
        let map, marker;

        function updateTime() {
            const n = new Date();
            document.getElementById('wm-time').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('wm-date').innerText = n.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateTime, 1000);

        async function startApp() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/vladmandic/face-api/master/model/');
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 640 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => detectFaces();
                initGPS();
            } catch (err) { alert("Izinkan Kamera & GPS untuk memulai."); }
        }

        async function detectFaces() {
            const canvas = document.getElementById('overlay');
            setInterval(async () => {
                const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
                faceapi.matchDimensions(canvas, displaySize);
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 }));
                document.getElementById('out-hadir').innerText = detections.length;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, faceapi.resizeResults(detections, displaySize));
            }, 500);
        }

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    document.getElementById('location-text').innerText = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
                    document.getElementById('gps-accuracy').innerText = `📡 GPS Aktif (Akurasi: ${Math.round(accuracy)}m)`;
                    
                    if (accuracy < 150) { // Toleransi akurasi 150 meter
                        btnSave.disabled = false;
                        btnSave.innerText = "💾 TERBITKAN LAPORAN PDF";
                    }

                    if (!map) {
                        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 17);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        marker = L.marker([latitude, longitude]).addTo(map);
                    } else {
                        map.setView([latitude, longitude]);
                        marker.setLatLng([latitude, longitude]);
                    }
                }, null, { enableHighAccuracy: true, maximumAge: 0 });
            }
        }

        function syncText(el, id) { 
            document.getElementById(id).innerText = el.value.toUpperCase() || (id.includes('opd') ? 'BKPSDM' : '0'); 
        }

        async function generateFastPDF() {
            btnSave.innerText = "⚡ MENCETAK PDF...";
            btnSave.disabled = true;

            const area = document.getElementById('report-area');
            const snapCanvas = document.getElementById('snapshot-canvas');
            const opdName = document.getElementById('input-opd').value || "BKPSDM";
            const dateStr = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');

            // Ambil snapshot video instan
            snapCanvas.width = video.videoWidth;
            snapCanvas.height = video.videoHeight;
            snapCanvas.getContext('2d').drawImage(video, 0, 0);
            
            video.style.display = 'none';
            snapCanvas.style.display = 'block';

            try {
                const canvasResult = await html2canvas(area, { 
                    useCORS: true, 
                    scale: 1.5,
                    logging: false,
                    backgroundColor: "#ffffff"
                });

                const imgData = canvasResult.toDataURL('image/jpeg', 0.8);
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvasResult.height * pdfWidth) / canvasResult.width;
                
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
                pdf.save(`Laporan_${opdName}_${dateStr}.pdf`);
                
            } catch (err) {
                alert("Gagal membuat PDF.");
            } finally {
                video.style.display = 'block';
                snapCanvas.style.display = 'none';
                btnSave.innerText = "💾 TERBITKAN LAPORAN PDF";
                btnSave.disabled = false;
            }
        }
    </script>
</body>
</html>
